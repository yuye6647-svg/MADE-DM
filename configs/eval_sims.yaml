base:
  seed: 1111
  batch_size: 1
  num_workers: 8
  train_mode: regression
  key_eval: MAE
  missing_rate_eval_test: 0.5


dataset:
  datasetName: sims
  dataPath: /media/user/a04954f8-f2f8-41ca-b4e9-4d07d1603697/yy/dataset/CH-SIMS/Processed/unaligned_39.pkl
  

model:    
  feature_extractor:
    bert_pretrained: 'bert-base-chinese'
    input_length: [39, 55, 400]
    token_length: [8, 8, 8]
    heads: 8
    input_dims: [768, 709, 33]
    hidden_dims: [128, 128, 128]
    depth: 2

  dmc:

    completeness_check:
      input_length: 8
      token_length: 1
      depth: 2
      heads: 8
      input_dim: 128
      hidden_dim: 128

  reconstructor:
    input_length: 8
    depth: 2
    heads: 8
    input_dim: 128
    hidden_dim: 128
      
